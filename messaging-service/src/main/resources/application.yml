server:
  port: 8087

spring:
  application:
    name: messaging-service
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    consul:
      config:
        enabled: false
        import-check:
          enabled: false
  mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/messaging_db}

app:
  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:*}
  security:
    enabled: false
